name: polymarket-nest

services:
  postgres:
    image: postgres:16-alpine
    container_name: polymarket-nest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: polymarket_nest
      POSTGRES_PASSWORD: polymarket_nest_dev
      POSTGRES_DB: polymarket_paper
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket_nest -d polymarket_paper"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: polymarket-nest-backend:dev
    container_name: polymarket-nest-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOST: 0.0.0.0
      PORT: 7802
      DATABASE_URL: postgresql://polymarket_nest:polymarket_nest_dev@postgres:5432/polymarket_paper?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ENABLE_REAL_EXECUTION: ${ENABLE_REAL_EXECUTION:-false}
      CLOB_WALLET_ADDRESS: ${CLOB_WALLET_ADDRESS:-your-wallet-address-here}
      CLOB_API_KEY: ${CLOB_API_KEY:-your-api-key-here}
      CLOB_API_SECRET: ${CLOB_API_SECRET:-your-api-secret-here}
      CLOB_API_PASSPHRASE: ${CLOB_API_PASSPHRASE:-your-passphrase-here}
      REAL_MAX_DAILY_LOSS_USD: ${REAL_MAX_DAILY_LOSS_USD:-100}
      REAL_MAX_NOTIONAL_USD: ${REAL_MAX_NOTIONAL_USD:-5000}
    ports:
      - "127.0.0.1:7802:7802"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:7802/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
